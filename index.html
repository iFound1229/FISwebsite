<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="tabs">
    <a href="#home" class="tab active">Home</a>
    <a href="#bio" class="tab">Bio</a>
    <a href="#shows" class="tab">Shows</a>
    <a href="#store" class="tab">Store</a>
    <a href="#songlist" class="tab">Song List</a>
    <a href="#contact" class="tab">Contact</a>
  </nav>

  <header class="title-section" id="home">
    <div class="logo-wrapper">
      <img src="images/logo.png" alt="Logo" class="logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
      <div class="logo-placeholder">Insert Logo Here</div>
    </div>
  </header>

  <section class="socials-section">
    <h2>Follow Me</h2>
    <div class="social-links">
      <a href="#" class="social-link" id="instagram-link">
        <span class="social-icon">📷</span>
        <span>Instagram</span>
      </a>
      <a href="#" class="social-link" id="youtube-link">
        <span class="social-icon">▶️</span>
        <span>YouTube</span>
      </a>
    </div>
  </section>

  <section class="picture-section">
    <div class="picture-wrapper">
      <img src="images/feature.jpg" alt="Feature" class="feature-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
      <div class="picture-placeholder">Insert Picture Here</div>
    </div>
  </section>

  <section class="events-section">
    <h2>Upcoming Events</h2>
    <ul class="events-list">
      <li class="event-item">
        <div class="event-date">TBD</div>
        <div class="event-details">
          <div class="event-name">Event Name</div>
          <div class="event-location">Venue / Location</div>
        </div>
      </li>
      <li class="event-item">
        <div class="event-date">TBD</div>
        <div class="event-details">
          <div class="event-name">Event Name</div>
          <div class="event-location">Venue / Location</div>
        </div>
      </li>
    </ul>
  </section>

  <section class="gallery-section">
    <h2>Photo Gallery</h2>
    <div class="slideshow">
      <div class="slides">
        <div class="slide active">
          <div class="slide-placeholder">Photo 1</div>
        </div>
        <div class="slide">
          <div class="slide-placeholder">Photo 2</div>
        </div>
        <div class="slide">
          <div class="slide-placeholder">Photo 3</div>
        </div>
      </div>
      <button class="slide-btn prev" aria-label="Previous">&#10094;</button>
      <button class="slide-btn next" aria-label="Next">&#10095;</button>
      <div class="dots">
        <span class="dot active" data-index="0"></span>
        <span class="dot" data-index="1"></span>
        <span class="dot" data-index="2"></span>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
